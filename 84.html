              'STARTER_2000': { group: 'STARTER', name: 'Health Starter 2,000', limit: 'ตามตาราง', type: 'แยกค่าใช้จ่าย', room: '2,000', icu: '4,000 (2 เท่า)', med2: '18,000', medsHome: '1,000/ครั้ง', doctor: '700/วัน', surgery: '60,000', opd: '4,000/ปี', ci: 'ไม่มี' },
              'STARTER_2500': { group: 'STARTER', name: 'Health Starter 2,500', limit: 'ตามตาราง', type: 'แยกค่าใช้จ่าย', room: '2,500', icu: '5,000 (2 เท่า)', med2: '20,000', medsHome: '1,000/ครั้ง', doctor: '800/วัน', surgery: '80,000', opd: '5,000/ปี', ci: 'ไม่มี' },
              'STARTER_3500': { group: 'STARTER', name: 'Health Starter 3,500', limit: 'ตามตาราง', type: 'แยกค่าใช้จ่าย', room: '3,500', icu: '7,000 (2 เท่า)', med2: '25,000', medsHome: '1,000/ครั้ง', doctor: '900/วัน', surgery: '90,000', opd: '6,000/ปี', ci: 'ไม่มี' },
              'STARTER_4500': { group: 'STARTER', name: 'Health Starter 4,500', limit: 'ตามตาราง', type: 'แยกค่าใช้จ่าย', room: '4,500', icu: '9,000 (2 เท่า)', med2: '30,000', medsHome: '1,000/ครั้ง', doctor: '1,000/วัน', surgery: '100,000', opd: '7,000/ปี', ci: 'ไม่มี' },

              'SAVER_200K': { group: 'SAVER', name: 'Health Saver 200,000', limit: '200,000', type: 'กึ่งเหมาจ่าย', room: '1,500', icu: '9,000 (6 เท่า)', med2: '25,000', medsHome: '5,000/ครั้ง', doctor: 'ตามจริง', surgery: 'ตามจริง', opd: 'ไม่มี', ci: 'เพิ่มวงเงิน 2 เท่า' },
              'SAVER_300K': { group: 'SAVER', name: 'Health Saver 300,000', limit: '300,000', type: 'กึ่งเหมาจ่าย', room: '2,000', icu: '12,000 (6 เท่า)', med2: '35,000', medsHome: '5,000/ครั้ง', doctor: 'ตามจริง', surgery: 'ตามจริง', opd: 'ไม่มี', ci: 'เพิ่มวงเงิน 2 เท่า' },
              'SAVER_400K': { group: 'SAVER', name: 'Health Saver 400,000', limit: '400,000', type: 'กึ่งเหมาจ่าย', room: '3,000', icu: '18,000 (6 เท่า)', med2: '40,000', medsHome: '5,000/ครั้ง', doctor: 'ตามจริง', surgery: 'ตามจริง', opd: '1,000/30ครั้ง', ci: 'เพิ่มวงเงิน 2 เท่า' },
              'SAVER_500K': { group: 'SAVER', name: 'Health Saver 500,000', limit: '500,000', type: 'กึ่งเหมาจ่าย', room: '4,000', icu: '24,000 (6 เท่า)', med2: '50,000', medsHome: '5,000/ครั้ง', doctor: 'ตามจริง', surgery: 'ตามจริง', opd: '1,500/30ครั้ง', ci: 'เพิ่มวงเงิน 2 เท่า' },
              
              'HAPPY_1M': { group: 'HAPPY', name: isKid ? 'Health Happy Kids 1 ล้าน' : 'Health Happy 1 ล้าน', limit: '1,000,000', type: 'เหมาจ่าย', room: '1,500', icu: 'เหมาจ่ายตามจริง', med2: isKid ? 'จำกัด 20,000/หมวดย่อย' : 'เหมาจ่ายตามจริง', medsHome: '20,000/ครั้ง', doctor: '1,000/วัน', surgery: 'เหมาจ่ายตามจริง', opd: 'ไม่มี', ci: 'เพิ่มวงเงิน 2 เท่า' },
              'HAPPY_5M': { group: 'HAPPY', name: isKid ? 'Health Happy Kids 5 ล้าน' : 'Health Happy 5 ล้าน', limit: '5,000,000', type: 'เหมาจ่าย', room: '3,000', icu: 'เหมาจ่ายตามจริง', med2: isKid ? 'จำกัด 25,000/หมวดย่อย' : 'เหมาจ่ายตามจริง', medsHome: '20,000/ครั้ง', doctor: '2,000/วัน', surgery: 'เหมาจ่ายตามจริง', opd: 'ไม่มี', ci: 'เพิ่มวงเงิน 2 เท่า' },
              'HAPPY_15M': { group: 'HAPPY', name: isKid ? 'Health Happy Kids 15 ล้าน' : 'Health Happy 15 ล้าน', limit: '15,000,000', type: 'เหมาจ่าย', room: '6,000', icu: 'เหมาจ่ายตามจริง', med2: isKid ? 'จำกัด 30,000/หมวดย่อย' : 'เหมาจ่ายตามจริง', medsHome: '20,000/ครั้ง', doctor: '4,000/วัน', surgery: 'เหมาจ่ายตามจริง', opd: 'ไม่มี', ci: 'เพิ่มวงเงิน 2 เท่า' },
              'HAPPY_25M': { group: 'HAPPY', name: isKid ? 'Health Happy Kids 25 ล้าน' : 'Health Happy 25 ล้าน', limit: '25,000,000', type: 'เหมาจ่าย', room: '9,000', icu: 'เหมาจ่ายตามจริง', med2: isKid ? 'จำกัด 40,000/หมวดย่อย' : 'เหมาจ่ายตามจริง', medsHome: 'เหมาจ่ายตามจริง', doctor: '6,000/วัน', surgery: 'เหมาจ่ายตามจริง', opd: '2,000/30ครั้ง', ci: 'เพิ่มวงเงิน 2 เท่า' }
            };
          }, [isKid]);

          // Handlers
          const handleGlobalSumChange = (e) => {
            const val = e.target.value.replace(/\D/g, '');
            if (val) {
              const numVal = parseInt(val, 10);
              setSumAssured(numVal); setSumStr(numVal.toLocaleString('en-US'));
              // Auto Sync
              if (ciSumAssured === sumAssured) { setCiSumAssured(numVal); setCiSumStr(numVal.toLocaleString('en-US')); }
              if (multiPaySumAssured === sumAssured) { setMultiPaySumAssured(numVal); setMultiPaySumStr(numVal.toLocaleString('en-US')); }
              if (tpdSumAssured === sumAssured) { setTpdSumAssured(numVal); setTpdSumStr(numVal.toLocaleString('en-US')); }
            } else {
              setSumAssured(0); setSumStr('');
            }
          };

          const handleInputChange = (e, setVal, setStr) => {
            const val = e.target.value.replace(/\D/g, '');
            if (val) {
              setVal(parseInt(val, 10)); setStr(parseInt(val, 10).toLocaleString('en-US'));
            } else {
              setVal(0); setStr('');
            }
          };

          const handleBasePlanChange = (e) => {
            const newPlan = e.target.value;
            setBasePlan(newPlan);
            
            // Adjust terms when switching plans
            if (newPlan === 'CI_SUPERCARE') {
              if (term !== 10 && term !== 20) setTerm(20);
              // CI SuperCare restrict riders
              setIncludeHealthRider(false);
              setIncludeHBRider(false);
              setIncludeMultiPayCIPlus(false);
              setIncludeHealthCancer(false);
              setIncludeCareForCancer(false);
            } else if (newPlan === 'PAY_LIFE_PLUS' || newPlan === 'LEGACY_PRESTIGE') {
              // Keeps 10, 15, 20
              if (term !== 10 && term !== 15 && term !== 20) setTerm(20);
            } else if (newPlan === 'TERM') {
              if (![5, 10, 15, 20].includes(term)) setTerm(20);
              if (sumAssured < 350000) {
                  setSumAssured(350000); setSumStr("350,000");
                  if (ciSumAssured === sumAssured) { setCiSumAssured(350000); setCiSumStr("350,000"); }
                  if (multiPaySumAssured === sumAssured) { setMultiPaySumAssured(350000); setMultiPaySumStr("350,000"); }
                  if (tpdSumAssured === sumAssured) { setTpdSumAssured(350000); setTpdSumStr("350,000"); }
              }
            }

            // Auto-adjust sum assured for Legacy Prestige Plus to minimum 10M
            if (newPlan === 'LEGACY_PRESTIGE' && sumAssured < 10000000) {
              setSumAssured(10000000);
              setSumStr("10,000,000");
              if (ciSumAssured === sumAssured) { setCiSumAssured(10000000); setCiSumStr("10,000,000"); }
              if (multiPaySumAssured === sumAssured) { setMultiPaySumAssured(10000000); setMultiPaySumStr("10,000,000"); }
              if (tpdSumAssured === sumAssured) { setTpdSumAssured(10000000); setTpdSumStr("10,000,000"); }
            }
          };

          useEffect(() => {
            if (isKid) {
              setStarterType(prev => prev === 'BALANCED' ? 'BEGIN' : prev);
              setRiderCategory(prev => prev === 'SAVER' ? 'HAPPY' : prev);
              
              // Remove Saver from compare mode if age < 11
              setSelectedComparePlans(prev => prev.filter(p => !p.startsWith('SAVER')));
            }
            
            // --- เงื่อนไขอายุ 0-5 ปี บังคับปิด HB ---
            if (age <= 5 && includeHB) {
              setIncludeHB(false);
            }
          }, [isKid, age, includeHB]);

          const validation = useMemo(() => {
            if (basePlan === 'PAY_LIFE_PLUS') {
              const minSum = term === 20 ? 150000 : 300000;
              if (sumAssured < minSum) return { isValid: false, msg: `ทุนขั้นต่ำ Pay Life Plus ${term} ปี คือ ${minSum.toLocaleString()} บ.` };
              if (sumAssured > 9999999) return { isValid: false, msg: `ทุนสูงสุด Pay Life Plus คือ 9,999,999 บ.` };
              if (age > 75) return { isValid: false, msg: 'อายุรับประกันไม่เกิน 75 ปี' };
            } else if (basePlan === '20PAY_LIFE') {
              if (sumAssured < 100000) return { isValid: false, msg: `ทุนขั้นต่ำ 20Pay Life คือ 100,000 บ.` };
              if (sumAssured > 9999999) return { isValid: false, msg: `ทุนสูงสุด 20Pay Life คือ 9,999,999 บ.` };
              if (age > 70) return { isValid: false, msg: 'อายุรับประกันไม่เกิน 70 ปี' };
            } else if (basePlan === 'PROCARE') {
              if (sumAssured < 200000) return { isValid: false, msg: `ทุนขั้นต่ำ CI ProCare คือ 200,000 บ.` };
              if (sumAssured > 10000000) return { isValid: false, msg: `ทุนสูงสุด CI ProCare คือ 10,000,000 บ.` };
              if (age > 60) return { isValid: false, msg: 'อายุรับประกันไม่เกิน 60 ปี' };
            } else if (basePlan === 'CI_SUPERCARE') {
              if (sumAssured < 200000) return { isValid: false, msg: `ทุนขั้นต่ำ CI SuperCare คือ 200,000 บ.` };
              if (sumAssured > 4999999) return { isValid: false, msg: `ทุนสูงสุด CI SuperCare คือ 4,999,999 บ.` };
              if (age > 65) return { isValid: false, msg: 'อายุรับประกันไม่เกิน 65 ปี' };
            } else if (basePlan === 'LEGACY_PRESTIGE') {
              if (sumAssured < 10000000) return { isValid: false, msg: `ทุนขั้นต่ำ Legacy Prestige Plus คือ 10,000,000 บ.` };
              if (sumAssured > 1000000000) return { isValid: false, msg: `ทุนสูงสุด Legacy Prestige Plus คือ 1,000,000,000 บ.` };
              if (age > 75) return { isValid: false, msg: 'อายุรับประกันไม่เกิน 75 ปี' };
            } else if (basePlan === 'TERM') {
              if (sumAssured < 350000) return { isValid: false, msg: `ทุนขั้นต่ำ Term คือ 350,000 บ.` };
              if (age < 20) return { isValid: false, msg: 'อายุรับประกัน Term ขั้นต่ำ 20 ปี' };
              if (term === 5 && age > 59) return { isValid: false, msg: 'อายุรับประกัน Term 5 ปี สูงสุด 59 ปี' };
              if (term === 10 && age > 55) return { isValid: false, msg: 'อายุรับประกัน Term 10 ปี สูงสุด 55 ปี' };
              if (term === 15 && age > 50) return { isValid: false, msg: 'อายุรับประกัน Term 15 ปี สูงสุด 50 ปี' };
              if (term === 20 && age > 45) return { isValid: false, msg: 'อายุรับประกัน Term 20 ปี สูงสุด 45 ปี' };
            }
            return { isValid: true, msg: '' };
          }, [basePlan, sumAssured, term, age]);

          const ciPremiumData = useMemo(() => {
            if (!validation.isValid || !includeCIRider) return { ciPlus: 0, ciTopUp: 0, multiPay: 0, totalCare: 0, tpd: 0, healthCancer: 0, careForCancer: 0, totalCI: 0 };
            
            let res = { ciPlus: 0, ciTopUp: 0, multiPay: 0, totalCare: 0, tpd: 0, healthCancer: 0, careForCancer: 0, totalCI: 0 };
            const getRate = (table) => table.find(b => age >= b.min && age <= b.max)?.[gender] || 0;

            if (includeCIPlus) res.ciPlus = (ciSumAssured / 1000) * getRate(CI_PLUS_RATES);
            
            if (includeCITopUp) res.ciTopUp = ((ciSumAssured * 0.4) / 1000) * getRate(CI_TOPUP_RATES);
            
            if (includeMultiPayCIPlus) {
              res.multiPay = (multiPaySumAssured / 1000) * getRate(MULTI_PAY_CI_RATES);
              res.totalCare = (multiPaySumAssured / 1000) * getRate(TOTAL_CARE_RATES);
            }
            if (includeTPD) res.tpd = (tpdSumAssured / 1000) * getRate(TPD_RATES);
            if (includeHealthCancer) res.healthCancer = healthCancerUnits * (getRate(HEALTH_CANCER_RATES) / 10);
            if (includeCareForCancer) res.careForCancer = careForCancerUnits * getRate(CARE_FOR_CANCER_RATES);

            res.totalCI = res.ciPlus + res.ciTopUp + res.multiPay + res.totalCare + res.tpd + res.healthCancer + res.careForCancer;
            return res;
          }, [validation.isValid, includeCIRider, includeCIPlus, ciSumAssured, gender, age, includeCITopUp, includeMultiPayCIPlus, multiPaySumAssured, includeTPD, tpdSumAssured, includeHealthCancer, healthCancerUnits, includeCareForCancer, careForCancerUnits]);

          const hbPremiumData = useMemo(() => {
            if (!validation.isValid || !includeHBRider) return { hb: 0, hbExtra: 0, totalHB: 0 };
            let res = { hb: 0, hbExtra: 0, totalHB: 0 };

            if (includeHB) {
              const b = HB_RATES.find(b => age >= b.min && age <= b.max);
              if (b) {
                let rate = (age >= 6 && age <= 15) ? 90 : (occupationClass === '3' ? b.class3 : occupationClass === '4' ? b.class4 : b.class12);
                res.hb = (hbAmount / 100) * rate;
              }
            }
            if (includeHBExtra) {
              const b = HB_EXTRA_RATES.find(b => age >= b.min && age <= b.max);
              if (b) res.hbExtra = (hbExtraAmount / 100) * b[gender];
            }
            res.totalHB = res.hb + res.hbExtra;
            return res;
          }, [validation.isValid, includeHBRider, includeHB, hbAmount, age, occupationClass, includeHBExtra, hbExtraAmount, gender]);

          const baseNetPremium = useMemo(() => {
            if (!validation.isValid) return 0;
            let baseRate = 0, discount = 0;
            
            if (basePlan === 'PAY_LIFE_PLUS') {
              baseRate = baseRateMapPayLife[age]?.[`${gender}${term}`] || 0;
            } else if (basePlan === '20PAY_LIFE') {
              baseRate = baseRateMap20Pay[age]?.[gender] || 0;
              if (sumAssured >= 600000) discount = 2.00; else if (sumAssured >= 250000) discount = 1.00;
            } else if (basePlan === 'PROCARE') {
              baseRate = baseRateMapProCare[age]?.[gender] || 0;
              if (sumAssured >= 5000000) discount = 3.00; else if (sumAssured >= 1000000) discount = 2.25; else if (sumAssured >= 800000) discount = 1.50; else if (sumAssured >= 500000) discount = 0.75;
            } else if (basePlan === 'CI_SUPERCARE') {
              if (term === 10) {
                baseRate = baseRateMapCISuper1099[age]?.[gender] || 0;
                if (sumAssured >= 1000000) discount = 2.50;
              } else if (term === 20) {
                baseRate = baseRateMapCISuper2099[age]?.[gender] || 0;
                if (sumAssured >= 1000000) discount = 1.50;
                else if (sumAssured >= 800000) discount = 1.00;
                else if (sumAssured >= 500000) discount = 0.50;
              }
            } else if (basePlan === 'LEGACY_PRESTIGE') {
              baseRate = getLegacyRate(age, gender === 'M', term, sumAssured);
            } else if (basePlan === 'TERM') {
              baseRate = baseRateMapTerm[age]?.[`${gender}${term}`] || 0;
              if (sumAssured >= 1000000) discount = 1.00;
              else if (sumAssured >= 500000) discount = 0.50;
            }
            
            return (sumAssured / 1000) * Math.max(0, baseRate - discount);
          }, [validation.isValid, basePlan, age, gender, term, sumAssured]);

          const getHealthPremium = (planId) => {
            if (!validation.isValid || !planId) return 0;
            
            if (planId.startsWith('HAPPY')) {
              const pKey = planId.split('_')[1];
              const band = isKid ? HEALTH_HAPPY_KIDS[happyDeductible]?.find(b => age >= b.min && age <= b.max) : HEALTH_HAPPY_ADULT.find(b => age >= b.min && age <= b.max);
              return band?.[pKey]?.[gender] || 0;
            } 
            if (planId.startsWith('SAVER')) {
              const pKey = planId.split('_')[1];
              return HEALTH_SAVER_RATES.find(b => age >= b.min && age <= b.max)?.[pKey]?.[gender] || 0;
            }
            if (planId.startsWith('STARTER')) {
              const pKey = planId.split('_')[1];
              const actualType = (isKid && starterType === 'BALANCED') ? 'BEGIN' : starterType;
              const table = actualType === 'BEGIN' ? HEALTH_STARTER_BEGIN : HEALTH_STARTER_BALANCED;
              return table.find(b => age >= b.min && age <= b.max)?.[pKey]?.[gender] || 0;
            }
            return 0;
          };

          const toggleComparePlan = (key) => {
            if (selectedComparePlans.includes(key)) {
              setSelectedComparePlans(selectedComparePlans.filter(p => p !== key));
            } else {
              if (selectedComparePlans.length < 4) {
                setSelectedComparePlans([...selectedComparePlans, key]);
              } else {
                alert('เลือกเปรียบเทียบได้สูงสุด 4 แผนครับ');
              }
            }
          };

          const renderUserInfoBox = () => (
            <div className="bg-white rounded-3xl p-6 shadow-sm border-2 border-gray-100 mb-6">
              <h2 className="text-xl font-bold mb-4 text-gray-800">ข้อมูลผู้เอาประกันและแผนหลัก</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                <div>
                  <label className="block text-sm font-semibold mb-2 text-gray-600">เพศ</label>
                  <select value={gender} onChange={e=>setGender(e.target.value)} className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl font-medium focus:border-[#D31145] focus:outline-none">
                    <option value="M">ชาย</option>
                    <option value="F">หญิง</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-2 text-gray-600">อายุ</label>
                  <input type="number" min="0" max="100" value={age} onChange={e=>setAge(Number(e.target.value))} className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl font-medium focus:border-[#D31145] focus:outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-2 text-gray-600">แผนหลัก</label>
                  <select value={basePlan} onChange={handleBasePlanChange} className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl font-medium focus:border-[#D31145] focus:outline-none">
                    <option value="PAY_LIFE_PLUS">Pay Life Plus</option>
                    <option value="20PAY_LIFE">20Pay Life</option>
                    <option value="TERM">Term</option>
                    <option value="PROCARE">CI ProCare</option>
                    <option value="CI_SUPERCARE">CI SuperCare</option>
                    <option value="LEGACY_PRESTIGE">Legacy Prestige Plus (new)</option>
                  </select>
                </div>
                {(basePlan === 'PAY_LIFE_PLUS' || basePlan === 'CI_SUPERCARE' || basePlan === 'LEGACY_PRESTIGE' || basePlan === 'TERM') && (
                  <div>
                    <label className="block text-sm font-semibold mb-2 text-gray-600">ระยะเวลาชำระเบี้ย (ปี)</label>
                    <select value={term} onChange={e=>setTerm(Number(e.target.value))} className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl font-medium focus:border-[#D31145] focus:outline-none">
                      {(basePlan === 'PAY_LIFE_PLUS' || basePlan === 'LEGACY_PRESTIGE') ? (
                        <>
                          <option value={10}>10</option>
                          <option value={15}>15</option>
                          <option value={20}>20</option>
                        </>
                      ) : basePlan === 'TERM' ? (
                        <>
                          <option value={5}>5</option>
                          <option value={10}>10</option>
                          <option value={15}>15</option>
                          <option value={20}>20</option>
                        </>
                      ) : (
                        <>
                          <option value={10}>10</option>
                          <option value={20}>20</option>
                        </>
                      )}
                    </select>
                  </div>
                )}
                <div className="md:col-span-2 lg:col-span-1">
                  <label className="block text-sm font-semibold mb-2 text-gray-600">ทุนประกันหลัก (บาท)</label>
                  <input type="text" value={sumStr} onChange={handleGlobalSumChange} className="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-xl font-medium focus:border-[#D31145] focus:outline-none" />
                </div>
              </div>
            </div>
          );

          const renderSingleMode = () => {
            let riderHealthPremium = 0;
            let riderHealthName = '';

            if (includeHealthRider && validation.isValid && basePlan !== 'CI_SUPERCARE') {
              const pKey = riderCategory === 'HAPPY' ? happyPlan : riderCategory === 'SAVER' ? saverPlan : starterPlan;
              riderHealthPremium = getHealthPremium(`${riderCategory}_${pKey}`);
              riderHealthName = riderCategory === 'HAPPY' ? (isKid ? `Health Happy Kids (${PLAN_DICT[`HAPPY_${pKey}`].name})` : PLAN_DICT[`HAPPY_${pKey}`].name) :
                                riderCategory === 'SAVER' ? PLAN_DICT[`SAVER_${pKey}`].name :
                                `Health Starter แบบ ${starterType} (${PLAN_DICT[`STARTER_${pKey}`].name})`;
            }

            const totalPremium = baseNetPremium + riderHealthPremium + ciPremiumData.totalCI + hbPremiumData.totalHB;
            const basePlanNameDisplay = basePlan === 'PAY_LIFE_PLUS' ? `Pay Life Plus` : 
                                        basePlan === '20PAY_LIFE' ? '20Pay Life' : 
                                        basePlan === 'CI_SUPERCARE' ? `CI SuperCare ${term}/99` : 
                                        basePlan === 'LEGACY_PRESTIGE' ? `Legacy Prestige Plus ${term} ปี` : 
                                        basePlan === 'TERM' ? `Term ${term} ปี` :

              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in-up">
                {/* Left: Settings */}
                <div className="lg:col-span-7 space-y-6">
                  
                  {/* Health Rider Box */}
                  {basePlan !== 'CI_SUPERCARE' && (
                    <div className={`bg-white rounded-2xl p-6 shadow-sm border-2 transition-all ${includeHealthRider ? 'border-[#D31145]' : 'border-gray-100'}`}>
                      <div className="flex justify-between items-center mb-6 cursor-pointer" onClick={() => setIncludeHealthRider(!includeHealthRider)}>
                        <h2 className={`text-xl font-bold flex items-center gap-2 ${includeHealthRider ? 'text-[#D31145]' : 'text-gray-800'}`}>
                          <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs ${includeHealthRider ? 'bg-red-100 text-[#D31145]' : 'bg-gray-100 text-gray-500'}`}>2</span>

                        </h2>
                        <CheckCircle2 className={includeHealthRider ? "text-[#D31145]" : "text-gray-300"} size={28}/>
                      </div>

                      {includeHealthRider && (
                        <div className="space-y-6 border-t border-gray-100 pt-4">
                          <div className="flex flex-col sm:flex-row p-1 bg-gray-100 rounded-xl gap-1">
                            <button onClick={() => setRiderCategory('HAPPY')} className={`flex-1 py-3 px-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 transition-all ${riderCategory === 'HAPPY' ? 'bg-white text-[#D31145] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                              <Stethoscope size={16} /> Health Happy
                            </button>
                            <button onClick={() => !isKid && setRiderCategory('SAVER')} disabled={isKid} className={`flex-1 py-3 px-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 transition-all ${isKid ? 'opacity-50 cursor-not-allowed' : riderCategory === 'SAVER' ? 'bg-white text-rose-500 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                              <HeartPulse size={16} /> Health Saver
                            </button>
                            <button onClick={() => setRiderCategory('STARTER')} className={`flex-1 py-3 px-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 transition-all ${riderCategory === 'STARTER' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                              <Activity size={16} /> Health Starter
                            </button>
                          </div>

                          {isKid && riderCategory !== 'HAPPY' && riderCategory !== 'STARTER' && (
                            <p className="text-amber-600 text-sm bg-amber-50 p-3 rounded-lg flex items-center gap-2"><AlertCircle size={16}/> Health Saver รับอายุ 11 ปีขึ้นไป</p>
                          )}

                          {riderCategory === 'HAPPY' && (
                            <div className="space-y-4 animate-fade-in-up">
                              {isKid && (
                                <div className="bg-orange-50 p-4 rounded-xl border border-orange-100 flex gap-4 items-center">
                                  <label className="text-sm font-semibold text-orange-800">ความรับผิดส่วนแรก (ต่อปี):</label>
                                  <select value={happyDeductible} onChange={(e)=>setHappyDeductible(e.target.value)} className="p-2 rounded-lg border-orange-200 text-sm font-medium focus:outline-none">
                                    <option value="10K">10,000 บาท</option><option value="30K">30,000 บาท</option>
                                  </select>
                                </div>
                              )}
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                {['1M','5M','15M','25M'].map(key => {
                                  const isSelected = happyPlan === key;
                                  return (
                                    <div key={key} onClick={() => setHappyPlan(key)} className={`p-4 rounded-xl border-2 cursor-pointer transition-all ${isSelected ? (isKid ? 'border-orange-500 bg-orange-50' : 'border-[#D31145] bg-red-50') : 'border-gray-200 hover:border-gray-300'}`}>
                                      <div className="flex justify-between items-center mb-2">
                                        <span className={`font-bold text-lg ${isSelected ? (isKid ? 'text-orange-600' : 'text-[#D31145]') : 'text-gray-800'}`}>{PLAN_DICT[`HAPPY_${key}`].name}</span>
                                        {isSelected ? <CheckCircle2 className={isKid ? "text-orange-500" : "text-[#D31145]"} size={22}/> : <Circle className="text-gray-300" size={22}/>}
                                      </div>
                                      <p className="text-xs text-gray-500">• ค่าห้อง {PLAN_DICT[`HAPPY_${key}`].room} บาท/วัน</p>
                                    </div>
                                  )
                                })}
                              </div>
                            </div>
                          )}

                          {riderCategory === 'SAVER' && !isKid && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 animate-fade-in-up">
                              {['200K','300K','400K','500K'].map(key => {
                                const isSelected = saverPlan === key;
                                return (
                                  <div key={key} onClick={() => setSaverPlan(key)} className={`p-4 rounded-xl border-2 cursor-pointer transition-all ${isSelected ? 'border-rose-500 bg-rose-50' : 'border-gray-200 hover:border-gray-300'}`}>
                                    <div className="flex justify-between items-center mb-2">
                                      <span className={`font-bold text-lg ${isSelected ? 'text-rose-600' : 'text-gray-800'}`}>{PLAN_DICT[`SAVER_${key}`].name}</span>
                                      {isSelected ? <CheckCircle2 className="text-rose-500" size={22}/> : <Circle className="text-gray-300" size={22}/>}
                                    </div>
                                    <p className="text-xs text-gray-500">• ค่าห้อง {PLAN_DICT[`SAVER_${key}`].room} บาท/วัน</p>
                                    {PLAN_DICT[`SAVER_${key}`].opd !== 'ไม่มี' && <p className="text-xs text-gray-500">• OPD {PLAN_DICT[`SAVER_${key}`].opd}</p>}
                                  </div>
                                )
                              })}
                            </div>
                          )}

                          {riderCategory === 'STARTER' && (
                            <div className="space-y-4 animate-fade-in-up">
                              <div className="flex gap-3 bg-slate-50 p-2 rounded-xl border border-slate-200">
                                <button onClick={() => setStarterType('BEGIN')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${starterType==='BEGIN'?'bg-blue-600 text-white shadow':'text-gray-500 hover:bg-gray-100'}`}>BEGIN (10%/30%)</button>
                                <button onClick={() => !isKid && setStarterType('BALANCED')} disabled={isKid} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${isKid ? 'opacity-40': starterType==='BALANCED'?'bg-blue-600 text-white shadow':'text-gray-500 hover:bg-gray-100'}`}>BALANCED (0%/20%)</button>
                              </div>
                              <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                {['1500','2000','2500','3500','4500'].map(key => {
                                  const isSelected = starterPlan === key;
                                  return (
                                    <div key={key} onClick={() => setStarterPlan(key)} className={`p-3 rounded-xl border-2 cursor-pointer transition-all ${isSelected ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'}`}>
                                      <p className={`font-bold text-center ${isSelected ? 'text-blue-700' : 'text-gray-700'}`}>{PLAN_DICT[`STARTER_${key}`].name}</p>
                                    </div>
                                  )
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}

                  {/* CI Rider Box */}
                  <div className={`bg-white rounded-2xl p-6 shadow-sm border-2 transition-all ${includeCIRider ? 'border-orange-400' : 'border-gray-100'}`}>

                      <h2 className={`text-xl font-bold flex items-center gap-2 ${includeCIRider ? 'text-orange-600' : 'text-gray-800'}`}>
                        <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs ${includeCIRider ? 'bg-orange-100 text-orange-600' : 'bg-gray-100 text-gray-500'}`}>{basePlan === 'CI_SUPERCARE' ? '2' : '3'}</span>
                        แนบสัญญาเพิ่มเติมโรคร้ายแรง
                      </h2>
                      <CheckCircle2 className={includeCIRider ? "text-orange-500" : "text-gray-300"} size={28}/>
                    </div>

                    {includeCIRider && (
                      <div className="space-y-4 border-t border-gray-100 pt-4 animate-fade-in-up">
                        
                        {(basePlan === 'PROCARE' || basePlan === 'CI_SUPERCARE') && (
                          <div className="bg-blue-50 p-3 rounded-lg flex items-start gap-2 text-sm text-blue-800">
                            <Info size={16} className="flex-shrink-0 mt-0.5" />
                            <p><b>{basePlan === 'PROCARE' ? 'CI ProCare' : 'CI SuperCare'}</b> มีความคุ้มครองโรคร้ายแรงระดับรุนแรงรวมอยู่ในเบี้ยประกันหลักแล้ว การซื้อสัญญาเพิ่มเติมจะเป็นการเพิ่มวงเงินคุ้มครอง</p>
                          </div>
                        )}

                        {basePlan === 'CI_SUPERCARE' && (
                          <div className="bg-orange-50 p-3 rounded-lg flex items-start gap-2 text-sm text-orange-800">
                            <ShieldAlert size={16} className="flex-shrink-0 mt-0.5" />
                            <p><b>CI SuperCare</b> สามารถแนบสัญญาเพิ่มเติมได้เฉพาะ <b>CI Plus</b>, <b>CI Top Up</b> และ <b>TPD</b> เท่านั้น</p>
                          </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                          <div className="col-span-1 md:col-span-2 mt-1 mb-1 flex justify-between items-center">
                            <h3 className="text-sm font-bold text-orange-600 flex items-center gap-1"><ShieldAlert size={16}/> กลุ่ม เจอ จ่าย จบ</h3>
                          </div>

                          <ToggleBox checked={includeCIPlus} onChange={()=>setIncludeCIPlus(!includeCIPlus)} title="CI Plus" desc="คุ้มครอง 44 โรคร้ายแรงระดับรุนแรง" color="orange">
                            <SumInput label="ทุนประกัน CI Plus (บาท):" value={ciSumStr} onChange={(e)=>handleInputChange(e, setCiSumAssured, setCiSumStr)} color="orange" />
                          </ToggleBox>
                          
                          <ToggleBox checked={includeCITopUp} onChange={()=>setIncludeCITopUp(!includeCITopUp)} title="CI Top Up" desc="คุ้มครองระดับต้น-ปานกลาง 18 โรค (40% ของ CI Plus)" color="orange">
                            <p className="text-xs text-orange-700 bg-orange-100/50 p-2 rounded">ทุนเอาประกัน: <b>{(ciSumAssured * 0.4).toLocaleString('en-US')}</b> บ.</p>
                          </ToggleBox>
                          
                          <ToggleBox checked={includeTPD} onChange={()=>setIncludeTPD(!includeTPD)} title="TPD" desc="คุ้มครองกรณีทุพพลภาพถาวรสิ้นเชิง" color="orange">
                            <SumInput label="ทุนประกัน TPD (บาท):" value={tpdSumStr} onChange={(e)=>handleInputChange(e, setTpdSumAssured, setTpdSumStr)} color="orange" />
                          </ToggleBox>

                          {basePlan !== 'CI_SUPERCARE' && (
                            <>
                              <div className="col-span-1 md:col-span-2 mt-4 mb-1">
                                <h3 className="text-sm font-bold text-purple-600 flex items-center gap-1"><Layers size={16}/> กลุ่ม เจอ จ่าย หลายจบ</h3>
                              </div>

                              <div className="col-span-1 md:col-span-2">
                                <ToggleBox checked={includeMultiPayCIPlus} onChange={()=>setIncludeMultiPayCIPlus(!includeMultiPayCIPlus)} title="Multi-Pay CI Plus" badge="Multi-Pay CI + Total Care" desc="เคลมโรคร้ายได้สูงสุด 11 ครั้ง (รวม 800%) พร้อมผลประโยชน์ดูแลต่อเนื่องและเงินชดเชยรายเดือน" color="purple">
                                    <SumInput label="ทุนประกัน Multi-Pay (บาท):" value={multiPaySumStr} onChange={(e)=>handleInputChange(e, setMultiPaySumAssured, setMultiPaySumStr)} color="purple" />
                                </ToggleBox>
                              </div>

                              <div className="col-span-1 md:col-span-2 mt-4 mb-1">
                                <h3 className="text-sm font-bold text-pink-600 flex items-center gap-1"><Heart size={16}/> กลุ่ม โรคมะเร็ง</h3>
                              </div>

                              <ToggleBox checked={includeHealthCancer} onChange={()=>setIncludeHealthCancer(!includeHealthCancer)} title="Health Cancer" desc="คุ้มครองมะเร็งและเพื่อน (เช่น ตับแข็ง, โปลิโอ)" color="pink">
                                <div className="flex items-center gap-2 mb-2">
                                    <label className="text-xs text-pink-900 font-medium">จำนวนหน่วย (1 หน่วย = 100k):</label>
                                    <input type="number" min="1" max="100" value={healthCancerUnits} onChange={(e) => setHealthCancerUnits(parseInt(e.target.value)||1)} className="w-16 p-1 border border-pink-300 rounded text-sm text-center font-bold text-pink-700 focus:outline-none" />
                                </div>
                                <p className="text-xs text-pink-800 bg-pink-100/50 inline-block px-2 py-1 rounded">🛌 นอนรักษา รพ. ได้คืนละ <b>{(healthCancerUnits*1000).toLocaleString()}</b> บ.</p>
                              </ToggleBox>

                              <ToggleBox checked={includeCareForCancer} onChange={()=>setIncludeCareForCancer(!includeCareForCancer)} title="Care for Cancer" desc="ค่าชดเชยรายวันสำหรับการเข้ารับการบำบัดรักษาโรคมะเร็ง" color="pink">
                                <div className="flex items-center gap-2 mb-2">
                                    <label className="text-xs text-pink-900 font-medium">จำนวนหน่วย (1 หน่วย = 100k):</label>
                                    <input type="number" min="1" max="100" value={careForCancerUnits} onChange={(e) => setCareForCancerUnits(parseInt(e.target.value)||1)} className="w-16 p-1 border border-pink-300 rounded text-sm text-center font-bold text-pink-700 focus:outline-none" />
                                </div>
                                <div className="flex flex-col gap-1 mt-1">
                                    <p className="text-xs text-pink-800 bg-pink-100/50 inline-block px-2 py-1 rounded w-fit">🛌 นอน รพ. ได้ <b>{(careForCancerUnits*2000).toLocaleString()}</b> บ./คืน</p>
                                    <p className="text-xs text-pink-800 bg-pink-100/50 inline-block px-2 py-1 rounded w-fit">🚶‍♀️ ไม่นอน (OPD) ได้ <b>{(careForCancerUnits*500).toLocaleString()}</b> บ./วัน</p>
                                </div>
                              </ToggleBox>
                            </>
                          )}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* HB Rider Box */}
                  {basePlan !== 'CI_SUPERCARE' && (
                    <div className={`bg-white rounded-2xl p-6 shadow-sm border-2 transition-all ${includeHBRider ? 'border-emerald-400' : 'border-gray-100'}`}>
                      <div className="flex justify-between items-center mb-6 cursor-pointer" onClick={() => setIncludeHBRider(!includeHBRider)}>
                        <h2 className={`text-xl font-bold flex items-center gap-2 ${includeHBRider ? 'text-emerald-600' : 'text-gray-800'}`}>
                          <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs ${includeHBRider ? 'bg-emerald-100 text-emerald-600' : 'bg-gray-100 text-gray-500'}`}>4</span>
                          แนบสัญญาเพิ่มเติมชดเชยรายได้ (HB)
                        </h2>
                        <CheckCircle2 className={includeHBRider ? "text-emerald-500" : "text-gray-300"} size={28}/>
                      </div>

                      {includeHBRider && (
                        <div className="space-y-4 border-t border-gray-100 pt-4 animate-fade-in-up">
                          <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                            <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                              <label className="text-sm font-semibold text-emerald-900 whitespace-nowrap">ขั้นอาชีพของผู้เอาประกัน:</label>
                              <select value={occupationClass} onChange={(e) => setOccupationClass(e.target.value)} disabled={age < 16} className={`w-full sm:w-48 p-2 bg-white border border-emerald-300 rounded-lg font-bold text-emerald-900 focus:border-emerald-500 focus:outline-none text-sm shadow-inner ${age < 16 ? 'opacity-60 cursor-not-allowed' : ''}`}>
                                <option value="1">ขั้น 1 หรือ 2</option><option value="3">ขั้น 3</option><option value="4">ขั้น 4</option>
                              </select>
                              {age < 16 && <span className="text-xs text-emerald-600 bg-white px-2 py-1 rounded-md border border-emerald-200">อายุต่ำกว่า 16 ปี ใช้เรทมาตรฐานเดียว</span>}
                            </div>
                          </div>

                          <div className="grid grid-cols-1 gap-4">
                            
                            {/* --- เงื่อนไขอายุ 0-5 ปี (ซ่อน HB แต่โชว์แบบ Disabled) --- */}
                            {age <= 5 ? (
                              <div className="p-4 rounded-xl border-2 border-gray-200 bg-gray-50 opacity-60">
                                <div className="flex justify-between items-center mb-1">
                                  <div className="flex items-center gap-2">
                                    <BedDouble size={18} className="text-gray-400"/>
                                    <span className="font-bold text-gray-500">HB</span>
                                  </div>
                                  <Circle className="text-gray-300" size={20}/>
                                </div>
                                <p className="text-xs text-red-500 mt-1">* อายุ 0-5 ปี ไม่สามารถแนบชดเชยรายวัน HB ได้</p>
                              </div>
                            ) : (
                              <ToggleBox checked={includeHB} onChange={()=>setIncludeHB(!includeHB)} title={<span className="flex items-center gap-2"><BedDouble size={18}/> HB</span>} desc="ค่าชดเชยรายวัน กรณีเข้ารักษาตัวเป็นผู้ป่วยในของโรงพยาบาล" color="emerald">
                                <SumInput label="เงินชดเชยรายวัน (บาท):" value={hbAmountStr} onChange={(e)=>handleInputChange(e, setHbAmount, setHbAmountStr)} color="emerald" />
                              </ToggleBox>
                            )}

                            <ToggleBox checked={includeHBExtra} onChange={()=>setIncludeHBExtra(!includeHBExtra)} title={<span className="flex items-center gap-2"><BedDouble size={18}/> HB Extra</span>} desc="ชดเชยรายวัน (ดีต่อใจ) ให้เพิ่มเมื่อเข้า ICU / ผ่าตัด / โรคร้ายแรง / กลับบ้าน / เสียชีวิต" color="emerald">
                              <SumInput label="เงินชดเชยอ้างอิง (บาท):" value={hbExtraAmountStr} onChange={(e)=>handleInputChange(e, setHbExtraAmount, setHbExtraAmountStr)} color="emerald" />
                              <ul className="text-xs text-emerald-800 bg-emerald-50 px-3 py-3 rounded-lg border border-emerald-200 mt-3 space-y-2">
                                  <li>• ชดเชยรายวันปกติ / Day Case รับ <b>{hbExtraAmount.toLocaleString()}</b> บ./วัน (1X)</li>
                                  <li>• พักห้อง ICU รับ <b>{(hbExtraAmount * 3).toLocaleString()}</b> บ./วัน (3X)</li>
                                  <li>• ผู้ป่วยในที่มีการผ่าตัด รับเพิ่ม <b>{(hbExtraAmount * 5).toLocaleString()}</b> บ. (5X)</li>
                                  <li>• ตรวจพบ 13 โรคร้ายแรง รับ <b>{(hbExtraAmount * 25).toLocaleString()}</b> บ. (25X)</li>
                                  <li>• ค่ายากลับบ้าน รับ <b>{hbExtraAmount.toLocaleString()}</b> บ./ครั้ง (1X)</li>
                                  <li>• กรณีเสียชีวิต รับ <b>{(hbExtraAmount * 10).toLocaleString()}</b> บ. (10X)</li>
                              </ul>
                            </ToggleBox>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                </div>

                {/* Right: Summary */}
                <div className="lg:col-span-5">
                  <div className="bg-gray-900 rounded-3xl p-6 md:p-8 shadow-xl text-white sticky top-6 border border-gray-800">
                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-gray-100 border-b border-gray-800 pb-4">
                      <Calculator className="text-[#D31145]" /> สรุปเบี้ยประกันภัย (รายปี)
                    </h2>
                    {validation.isValid ? (
                      <div className="space-y-6">
                        <div className="flex justify-between items-center text-gray-300">
                          <span>1. {basePlanNameDisplay} <span className="text-xs opacity-60">(ทุน {sumStr})</span></span>
                          <span className="font-semibold text-white">{baseNetPremium.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span>
                        </div>

                        {includeHealthRider && basePlan !== 'CI_SUPERCARE' && (
                          <div className="flex justify-between items-start text-gray-300">
                            <span className="pr-4">2. สุขภาพ <span className="text-sm block text-gray-400 mt-0.5">{riderHealthName}</span></span>
                            <span className="font-semibold text-white whitespace-nowrap">{riderHealthPremium.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span>
                          </div>
                        )}

                        {includeCIRider && ciPremiumData.totalCI > 0 && (
                          <div className="flex flex-col gap-2 text-gray-300">
                            <span className="pr-4 border-b border-gray-700 pb-1 mb-1 inline-block w-fit">
                              {basePlan === 'CI_SUPERCARE' ? '2. สัญญาเพิ่มเติม' : '3. โรคร้ายแรงและทุพพลภาพ'}
                            </span>
                            {includeCIPlus && <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">CI Plus <span className="text-xs opacity-60">({ciSumStr})</span></span><span className="text-orange-300 font-medium">{ciPremiumData.ciPlus.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>}
                            {includeCITopUp && <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">CI Top Up <span className="text-xs opacity-60">({(ciSumAssured * 0.4).toLocaleString('en-US')})</span></span><span className="text-orange-300 font-medium">{ciPremiumData.ciTopUp.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>}
                            {includeTPD && <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">TPD <span className="text-xs opacity-60">({tpdSumStr})</span></span><span className="text-orange-300 font-medium">{ciPremiumData.tpd.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>}
                            {includeMultiPayCIPlus && basePlan !== 'CI_SUPERCARE' && (
                              <><div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">Multi-Pay CI <span className="text-xs opacity-60">({multiPaySumStr})</span></span><span className="text-purple-300 font-medium">{ciPremiumData.multiPay.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>
                                <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">Total Care <span className="text-xs opacity-60">({multiPaySumStr})</span></span><span className="text-purple-300 font-medium">{ciPremiumData.totalCare.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div></>
                            )}
                            {includeHealthCancer && basePlan !== 'CI_SUPERCARE' && <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">Health Cancer <span className="text-xs opacity-60">({healthCancerUnits} หน่วย)</span></span><span className="text-pink-300 font-medium">{ciPremiumData.healthCancer.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>}
                            {includeCareForCancer && basePlan !== 'CI_SUPERCARE' && <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">Care for Cancer <span className="text-xs opacity-60">({careForCancerUnits} หน่วย)</span></span><span className="text-pink-300 font-medium">{ciPremiumData.careForCancer.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>}
                          </div>
                        )}

                        {includeHBRider && hbPremiumData.totalHB > 0 && basePlan !== 'CI_SUPERCARE' && (
                          <div className="flex flex-col gap-2 text-gray-300">
                            <span className="pr-4 border-b border-gray-700 pb-1 mb-1 inline-block w-fit">4. ชดเชยรายได้ (HB)</span>
                            {includeHB && <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">HB <span className="text-xs opacity-60">(วันละ {hbAmountStr} บ.)</span></span><span className="text-emerald-300 font-medium">{hbPremiumData.hb.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>}
                            {includeHBExtra && <div className="flex justify-between pl-4 text-sm"><span className="text-gray-400">HB Extra <span className="text-xs opacity-60">(วันละ {hbExtraAmountStr} บ.)</span></span><span className="text-emerald-300 font-medium">{hbPremiumData.hbExtra.toLocaleString('en-US',{maximumFractionDigits:0})} บ.</span></div>}
                          </div>
                        )}

                        <div className="pt-6 border-t border-gray-800">
                          <p className="text-sm text-gray-400 mb-1">รวมต้องชำระรายปี</p>
                          <p className="text-4xl lg:text-5xl font-bold text-white text-right">
                            {totalPremium.toLocaleString('en-US',{maximumFractionDigits:0})} <span className="text-xl font-medium text-gray-300">บาท</span>
                          </p>
                        </div>
                      </div>
                    ) : (
                      <p className="text-red-400 opacity-80 py-10 text-center flex flex-col items-center gap-2">
                        <AlertCircle size={32}/> {validation.msg || 'กรุณาระบุข้อมูลให้ถูกต้อง'}
                      </p>
                    )}
                  </div>
                </div>
              </div>
            );
          };

          const renderCompareMode = () => {
            if (basePlan === 'CI_SUPERCARE') {
              return (
                <div className="bg-white rounded-2xl p-10 shadow-sm border-2 border-orange-200 text-center animate-fade-in-up">
                  <ShieldAlert size={48} className="mx-auto text-orange-400 mb-4" />
                  <h3 className="text-xl font-bold text-gray-800 mb-2">ไม่สามารถเปรียบเทียบแผนสุขภาพได้</h3>
                  <p className="text-gray-600">แบบประกัน CI SuperCare ไม่สามารถแนบสัญญาเพิ่มเติมสุขภาพได้ครับ<br/>กรุณาเปลี่ยนแผนหลักเป็นแบบอื่น (เช่น Pay Life Plus) เพื่อเปรียบเทียบแผนสุขภาพ</p>
                </div>
              );
            }

            // Generate Columns
            const cols = selectedComparePlans.map(key => healthBenefitsCompare[key]);
            
            // Calculate Premiums for each column
            const premiumData = selectedComparePlans.map(key => {
              const healthPremium = getHealthPremium(key);
              // Base + CI + HB are fixed from global state
              const totalCI = ciPremiumData.totalCI;
              const totalHB = hbPremiumData.totalHB;
              const total = baseNetPremium + healthPremium + totalCI + totalHB;
              
              let subtitle = '';
              if (key.startsWith('STARTER')) subtitle = `(แบบ ${starterType})`;
              if (key.startsWith('HAPPY') && isKid) subtitle = `(Deduct ${happyDeductible})`;

              return { health: healthPremium, total, subtitle };
            });

            return (
              <div className="space-y-6 animate-fade-in-up">
                
                {/* Plan Selection Box */}
                <div className="bg-white rounded-2xl p-6 shadow-sm border-2 border-gray-100">
                  <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <CheckSquare className="text-[#D31145]" /> เลือกแผนที่ต้องการเปรียบเทียบ <span className="text-sm font-normal text-gray-500">(เลือกได้สูงสุด 4 แผน)</span>
                  </h2>
                  
                  {/* Additional Options for Compare Mode */}
                  <div className="flex flex-wrap gap-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <div className="flex items-center gap-2">
                        <label className="text-sm font-semibold text-gray-700">Health Starter:</label>
                        <select value={starterType} onChange={(e) => setStarterType(e.target.value)} className="p-1.5 rounded-lg border-gray-300 text-sm font-medium focus:outline-none">
                            <option value="BEGIN">Begin</option>
                            {!isKid && <option value="BALANCED">Balanced</option>}
                        </select>
                    </div>
                    {isKid && (
                        <div className="flex items-center gap-2">
                            <label className="text-sm font-semibold text-gray-700">Happy Deductible:</label>
                            <select value={happyDeductible} onChange={(e) => setHappyDeductible(e.target.value)} className="p-1.5 rounded-lg border-gray-300 text-sm font-medium focus:outline-none">
                                <option value="10K">10,000 บาท</option>
                                <option value="30K">30,000 บาท</option>
                            </select>
                        </div>
                    )}
                  </div>

                  <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
                    {Object.keys(healthBenefitsCompare).map(key => {
                      if (isKid && key.startsWith('SAVER')) return null; // Hide Saver for kids
                      const isSelected = selectedComparePlans.includes(key);
                      const plan = healthBenefitsCompare[key];
                      const isHappy = plan.group === 'HAPPY';
                      const isStarter = plan.group === 'STARTER';

                      return (
                        <div 
                          key={key} 
                          onClick={() => toggleComparePlan(key)}
                          className={`p-3 rounded-xl border-2 cursor-pointer transition-all flex flex-col justify-center items-center text-center gap-1 ${
                            isSelected 
                            ? (isHappy ? 'border-[#D31145] bg-red-50' : isStarter ? 'border-blue-500 bg-blue-50' : 'border-rose-500 bg-rose-50') 
                            : 'border-gray-200 hover:border-gray-300'
                          }`}
                        >
                          {isSelected ? <CheckSquare size={20} className={isHappy ? "text-[#D31145]" : isStarter ? "text-blue-500" : "text-rose-500"} /> : <Square size={20} className="text-gray-300" />}
                          <span className={`font-bold text-[13px] ${isSelected ? (isHappy ? 'text-[#D31145]' : isStarter ? 'text-blue-700' : 'text-rose-600') : 'text-gray-600'}`}>
                            {plan.name}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Comparison Table */}
                {selectedComparePlans.length > 0 && (
                  <div className="bg-white rounded-2xl shadow-sm border-2 border-gray-100 overflow-hidden">
                    <div className="bg-gradient-to-r from-[#D31145] to-rose-500 p-4 text-white">
                      <h2 className="text-xl font-bold flex items-center gap-2"><Table size={24}/> เปรียบเทียบแผนที่เลือก</h2>
                    </div>
                    
                    <div className="overflow-x-auto no-scrollbar">
                      <table className="w-full text-sm text-left whitespace-nowrap">
                        <thead>
                          <tr className="border-b-2 border-gray-200 bg-gray-50">
                            <th className="sticky left-0 bg-gray-50 p-4 font-bold text-gray-700 min-w-[200px] shadow-[2px_0_5px_rgba(0,0,0,0.03)] z-10">รายการความคุ้มครอง</th>
                            {cols.map((col, idx) => (
                              <th key={idx} className={`p-4 font-bold text-center min-w-[160px] ${col.group === 'HAPPY' ? 'text-[#D31145]' : col.group === 'STARTER' ? 'text-blue-600' : 'text-rose-600'}`}>
                                {col.name.replace('Health ', '')}
                              </th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {[
                            { label: 'รูปแบบความคุ้มครอง', key: 'type', bg: 'bg-white' },
                            { label: 'วงเงินค่ารักษา (บาท/ปี)', key: 'limit', bg: 'bg-rose-50 font-bold text-rose-800', valClass: 'font-bold' },
                            { label: 'ค่าห้อง อาหาร บริการ รพ.', key: 'room', bg: 'bg-white' },
                            { label: 'ค่าห้อง ICU', key: 'icu', bg: 'bg-gray-50' },
                            { label: 'ค่ารักษาพยาบาล (หมวด 2)', key: 'med2', bg: 'bg-white' },
                            { label: 'ค่ายากลับบ้าน', key: 'medsHome', bg: 'bg-gray-50' },
                            { label: 'ค่าแพทย์ตรวจรักษา', key: 'doctor', bg: 'bg-white' },
                            { label: 'ค่าผ่าตัด', key: 'surgery', bg: 'bg-gray-50' },
                            { label: 'OPD ผู้ป่วยนอก', key: 'opd', bg: 'bg-white' },
                            { label: 'โรคร้ายแรง (CI)', key: 'ci', bg: 'bg-gray-50 text-xs' },
                          ].map((row, rIdx) => (
                            <tr key={rIdx} className={`border-b border-gray-100 ${row.bg}`}>
                              <td className={`sticky left-0 p-4 font-medium text-gray-700 shadow-[2px_0_5px_rgba(0,0,0,0.02)] z-10 ${row.bg}`}>{row.label}</td>
                              {cols.map((col, cIdx) => (
                                <td key={cIdx} className={`p-4 text-center text-gray-600 ${row.valClass || ''}`}>{col[row.key]}</td>
                              ))}
                            </tr>
                          ))}
                          
                          {/* Premiums Rows */}
                          <tr className="border-b border-gray-200 bg-red-50/50">
                            <td className="sticky left-0 bg-red-50/50 p-4 font-bold text-[#D31145] shadow-[2px_0_5px_rgba(0,0,0,0.02)] z-10">เบี้ยสุขภาพรายปี (บาท)</td>
                            {premiumData.map((data, idx) => (
                              <td key={idx} className="p-4 text-center font-bold text-[#D31145] text-base">
                                  {data.health.toLocaleString()}
                                  {data.subtitle && <div className="text-[10px] font-normal opacity-80">{data.subtitle}</div>}
                              </td>
                            ))}
                          </tr>
                          <tr className="bg-[#D31145] text-white">
                            <td className="sticky left-0 bg-[#D31145] p-4 font-bold shadow-[2px_0_5px_rgba(0,0,0,0.1)] z-10">
                              เบี้ยรวมทั้งหมด (บาท)<br/>
                              <span className="text-xs font-normal opacity-80">(รวมหลัก + สุขภาพ + สัญญาเพิ่มเติมอื่น)</span>
                            </td>
                            {premiumData.map((data, idx) => (
                              <td key={idx} className="p-4 text-center font-bold text-xl">{data.total.toLocaleString()}</td>
                            ))}
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-gray-50 p-2 md:p-6 font-sans text-gray-800">
              <div className="max-w-7xl mx-auto">
                
                {/* Header */}
                <div className="bg-gradient-to-r from-[#D31145] to-[#f43f5e] text-white rounded-3xl p-6 md:p-8 shadow-lg mb-6">
                  <div className="flex items-center gap-4 mb-2">
                    <ShieldCheck size={36} className="text-white" />
                    <h1 className="text-2xl md:text-3xl font-bold tracking-wide">Premium Calculator</h1>
                  </div>
                  <p className="text-red-100 text-sm md:text-base opacity-90 md:ml-[3.25rem]">คำนวณเบี้ยประกันหลัก + สัญญาเพิ่มเติม (สุขภาพ, โรคร้ายแรง, ชดเชยรายได้)</p>
                </div>

                {/* Tabs */}
                <div className="flex flex-wrap bg-gray-200 p-1 rounded-2xl mb-6 w-fit mx-auto sm:mx-0">
                  <button 
                    onClick={() => setAppMode('SINGLE')} 
                    className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-sm transition-all ${appMode === 'SINGLE' ? 'bg-white text-[#D31145] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                  >
                    <Calculator size={18}/> คำนวณเบี้ยเดี่ยว
                  </button>
                  <button 
                    onClick={() => setAppMode('COMPARE')} 
                    className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-sm transition-all ${appMode === 'COMPARE' ? 'bg-white text-[#D31145] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                  >
                    <Table size={18}/> เปรียบเทียบแผนสุขภาพ
                  </button>
                </div>

                {/* Global Setup */}
                {renderUserInfoBox()}

                {/* Dynamic Area */}
                {appMode === 'SINGLE' ? renderSingleMode() : renderCompareMode()}

              </div>
              
              <style dangerouslySetInnerHTML={{__html: `
                @keyframes fadeInUp {
                  from { opacity: 0; transform: translateY(15px); }
                  to { opacity: 1; transform: translateY(0); }
                }
                .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                
                /* Hide scrollbar */
                .no-scrollbar::-webkit-scrollbar { display: none; }
                .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
              `}} />
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = createRoot(rootElement);
          root.render(<App />);
        }
    </script>
</body>
</html>
